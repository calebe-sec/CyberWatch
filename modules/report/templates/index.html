<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberWatch — Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-bracket">[</span>CyberWatch<span class="logo-bracket">]</span>
            </div>
            <span class="status-dot" id="statusDot"></span>
        </div>
    </header>

    <main class="main">
        <section class="hero">
            <h1 class="hero-title">Relatórios de Scan</h1>
            <p class="hero-sub">Selecione um relatório para inspecionar os resultados.</p>
        </section>

        <section class="reports-section">
            <div class="section-label">// ARQUIVOS ENCONTRADOS</div>
            <div id="reports" class="reports-grid"></div>
            <div id="empty" class="empty hidden">Nenhum relatório encontrado.</div>
            <div id="loading" class="loading">Carregando...</div>
        </section>
    </main>

    <!-- Modal de detalhes -->
    <div id="modal" class="modal hidden">
        <div class="modal-box">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">Relatório</span>
                <button class="modal-close" onclick="fecharModal()">✕</button>
            </div>
            <pre id="modalContent" class="modal-content"></pre>
        </div>
    </div>

    <script src="/static/scripts.js"></script>
</body>
</html>
